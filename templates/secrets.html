{% extends "base.html" %}

{% block title %}Welcome – City of Miami{% endblock %}

{% block extra_css %}
<style>
  .welcome-container {
    max-width: 680px;
    margin: 80px auto;
    padding: 40px 28px;
    text-align: center;
    font-family: Inter, system-ui, sans-serif;
  }

  .welcome-container .title {
    font-size: 32px;
    font-weight: 900;
    color: #113033;
    margin: 0 0 12px;
  }

  .welcome-container p {
    font-size: 14px;
    color: rgba(17, 48, 51, 0.7);
    margin: 0 0 32px;
  }

  .logout-btn {
    display: inline-block;
    padding: 12px 28px;
    background: #6fb6bb;
    color: #fff;
    text-decoration: none;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.2s ease;
  }

  .logout-btn:hover {
    background: #5aa8ad;
  }
</style>
{% endblock %}

{% block content %}
<div class="welcome-container">
  <h1 class="title">Welcome, {{ name }}!</h1>
  <p>Awards and grants from outstanding participation coming soon!</p>
  <a href="{{ url_for('logout') }}" class="logout-btn">Log Out</a>
</div>
{% endblock %}
